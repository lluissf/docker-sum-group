name: CI Pipeline - Soma API

# Define quando o pipeline será executado
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Rodar Testes (Pytest)
        run: |
          pytest

  build-docker:
    needs: test # Só builda se os testes passarem
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da Imagem Multi-stage
        run: |
          docker build -t soma-api:latest -f Dockerfile .

      - name: Verificar se a imagem está saudável
        run: |
          # Sobe o container para teste rápido de fumaça (smoke test)
          docker run -d -p 8001:8001 --name api-check soma-api:latest
          sleep 5
          docker ps
          # Verifica se o status está 'healthy' ou se responde 200 OK
          docker inspect --format='{{json .State.Health.Status}}' api-check | grep "healthy"